services:
  postgres:
    image: postgres:16-alpine
    container_name: habitify-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: habitify_auth
      POSTGRES_USER: habitify
      POSTGRES_PASSWORD: habitify
    volumes:
      - habitify_pgdata:/var/lib/postgresql/data

volumes:
  habitify_pgdata: