server:
  port: 8081

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

  datasource:
    url: jdbc:postgresql://localhost:5432/habitify_auth
    username: habitify
    password: habitify
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  logging:
  level:
    org.springframework.security: DEBUG
    
jwt:
  secret: dGhpcy1pcy1hLXZlcnktc2VjdXJlLXNlY3JldC1rZXktMjU2LWJpdHM=
  expirationMs: 3600000

management:
  endpoints:
    web:
      exposure:
        include: health  # Add others if needed, e.g., info, prometheus
  endpoint:
    health:
      show-details: always  # Optional

